<!DOCTYPE html>
<html>

<head>
    <title>Website - Thomas Greenwood</title>

    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
        integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <!-- Navbar loaded in this div -->
    <div id="navigation"></div>

    <div class="container pb-4">
        <div class="row">
            <div class="pt-3">
                <h1>This Website</h1>
            </div>
        </div>

        <div class="row">
            <p class="text-left">A portfolio of sorts.</p>
        </div>

        <div class="row">
            <div class="pt-3">
                <h3>Why?</h3>
                <p></p>
            </div>
        </div>


        <div class="row">
            <div class="pt-3">
                <h3>Links</h3>
                <p>As with many of my projects, this website is fully open source and available at GitHub. Not that it
                    matters as you can inspect the source from your browser, but it's the thought that counts, right?
                </p>
            </div>
        </div>

        <div class="row">
            <div class="btn-group">
                <a href="https://github.com/greenywd/greenywd.github.io" alt="Open on GitHub" class="btn btn-dark btn-primary active"
                    target="_blank">
                    <img src='/images/github-mark-light.png' style='padding-right: 5px;'> Open on GitHub
                </a>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"
        integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo"
        crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"
        integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
        crossorigin="anonymous"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"
        integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
        crossorigin="anonymous"></script>
</body>

<script>
    // Load navbar from navigation.html
    const xhr = new XMLHttpRequest();
    xhr.open('GET', '/navigation.html', true);
    xhr.onload = function () {
        if (this.status !== 200) return;
        document.getElementById('navigation').innerHTML = this.responseText;
        document.getElementById("projects").classList.add("active")
        document.getElementById("website-dropdown-item").classList.add("active")
    };
    xhr.send();
</script>
